<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>antd.esm.js</title>
    <script type="importmap">
      {
        "imports": {
          "react": "../dist/react-all.esm.js",
          "react-dom": "../dist/react-all.esm.js",
          "react-dom/client": "../dist/react-all.esm.js",
          "antd": "../dist/antd.esm.js"
        }
      }
    </script>
    <script src="./vendor/babel.min.js"></script>
    <script type="text/babel" data-type="module">
      import React, { useState } from "react";
      import { createRoot } from "react-dom/client";
      import {
        Alert,
        Button,
        Card,
        ConfigProvider,
        Divider,
        Space,
        Tag,
        Typography,
        version as antdVersion
      } from "antd";

      function App() {
        const [count, setCount] = useState(0);
        const items = [
          `antd version: ${antdVersion}`,
          "Button",
          "Alert",
          "Typography",
          "Tag"
        ];

        return (
          <ConfigProvider>
            <Card
              title="antd.esm.js"
              style={{
                margin: "24px auto",
                maxWidth: "560px"
              }}
            >
              <Space orientation="vertical" size={16}>
                <Alert type="success" title="antd bundle loaded" showIcon />
                <Typography.Text>{`当前计数: ${count}`}</Typography.Text>
                <React.Fragment>
                  {items.map((item) => (
                    <Tag key={item}>{item}</Tag>
                  ))}
                </React.Fragment>
                <Divider />
                <Button type="primary" onClick={() => setCount((value) => value + 1)}>
                  增加
                </Button>
              </Space>
            </Card>
          </ConfigProvider>
        );
      }

      createRoot(document.getElementById("app")).render(<App />);
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
  </html>
