<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>clsx.min.js</title>
    <script type="importmap">
      {
        "imports": {
          "react": "../dist/react-all.min.js",
          "react-dom/client": "../dist/react-all.min.js",
          "clsx": "../dist/clsx.min.js"
        }
      }
    </script>
    <script src="./vendor/tailwindcss-browser.js"></script>
    <script src="./vendor/babel.min.js"></script>
    <script type="text/babel" data-type="module">
      import React, { useState } from "react";
      import { createRoot } from "react-dom/client";
      import clsx from "clsx";

      const toggles = [
        { key: "accent", label: "Accent" },
        { key: "framed", label: "Framed" },
        { key: "elevated", label: "Elevated" }
      ];

      function buttonClass(enabled) {
        return clsx(
          "rounded-full border px-4 py-2 text-sm font-medium transition",
          enabled
            ? "border-slate-900 bg-slate-900 text-white shadow-sm"
            : "border-slate-300 bg-white text-slate-700 hover:border-slate-400"
        );
      }

      function App() {
        const [state, setState] = useState({
          accent: true,
          framed: false,
          elevated: true
        });

        const cardClass = clsx(
          "rounded-[28px] border p-8 transition-all duration-300",
          state.accent ? "border-cyan-200 bg-cyan-50/60" : "border-slate-200 bg-white/90",
          state.framed ? "shadow-[inset_0_0_0_1px_rgba(14,165,233,0.18)]" : "text-slate-900",
          state.elevated
            ? "shadow-[0_28px_90px_rgba(15,23,42,0.18)]"
            : "shadow-[0_12px_35px_rgba(15,23,42,0.08)]"
        );
        const labelClass = clsx("mt-4 max-w-xl text-sm leading-7 text-slate-600");
        const tokenClass = clsx(
          "inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-[0.22em]",
          state.accent ? "bg-cyan-100 text-cyan-800" : "bg-slate-200 text-slate-700"
        );
        const previewPanelClass = clsx(
          "mt-6 rounded-3xl border border-dashed p-5 transition-all duration-300",
          state.framed ? "border-cyan-300 bg-white" : "border-slate-300 bg-slate-50"
        );
        function toggle(key) {
          setState((current) => ({
            ...current,
            [key]: !current[key]
          }));
        }

        return (
          <main className="min-h-screen bg-[radial-gradient(circle_at_top,_#ecfeff_0%,_#f8fafc_35%,_#e2e8f0_100%)] px-4 py-10 text-slate-900">
            <section className="mx-auto max-w-5xl">
              <div className="mb-8 flex flex-wrap items-end justify-between gap-5">
                <div>
                  <p className="text-xs font-semibold uppercase tracking-[0.32em] text-cyan-700">Utility Bundle</p>
                  <h1 className="mt-2 text-4xl font-semibold tracking-tight text-slate-900">clsx.min.js</h1>
                  <p className="mt-3 max-w-2xl text-sm leading-7 text-slate-600">
                    在 React 组件里组合字符串、数组和对象条件，快速得到最终 className。
                  </p>
                </div>
                <div className="rounded-full border border-cyan-200 bg-white/80 px-4 py-2 text-sm font-medium text-cyan-800 shadow-sm backdrop-blur">
                  react + clsx
                </div>
              </div>

              <div className="grid gap-6 lg:grid-cols-[1.15fr_0.85fr]">
                <section className={cardClass}>
                  <span className={tokenClass}>live preview</span>
                  <h2 className="mt-4 text-2xl font-semibold tracking-tight text-slate-900">按状态拼出最终样式</h2>
                  <p className={labelClass}>
                    这个例子通过 React state 驱动开关，再由 <code>clsx</code> 组合出最终的 class 字符串。
                  </p>
                  <div className="mt-6 flex flex-wrap gap-3">
                    {toggles.map(({ key, label }) => (
                      <button key={key} type="button" onClick={() => toggle(key)} className={buttonClass(state[key])}>
                        {label}
                      </button>
                    ))}
                  </div>
                  <div className={previewPanelClass}>
                    <div className="flex flex-wrap gap-2">
                      <span className="rounded-full bg-slate-900 px-3 py-1 text-xs font-medium text-white">string</span>
                      <span className="rounded-full bg-slate-200 px-3 py-1 text-xs font-medium text-slate-700">array</span>
                      <span className="rounded-full bg-cyan-100 px-3 py-1 text-xs font-medium text-cyan-800">
                        object conditions
                      </span>
                    </div>
                    <div className="mt-4 grid gap-3 sm:grid-cols-3">
                      <div className="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                        <p className="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">Accent</p>
                        <p className="mt-3 text-sm font-medium text-slate-900">
                          {state.accent ? "Cyan surface" : "Neutral surface"}
                        </p>
                      </div>
                      <div className="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                        <p className="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">Framed</p>
                        <p className="mt-3 text-sm font-medium text-slate-900">
                          {state.framed ? "Inset outline on" : "Inset outline off"}
                        </p>
                      </div>
                      <div className="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                        <p className="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">Elevated</p>
                        <p className="mt-3 text-sm font-medium text-slate-900">
                          {state.elevated ? "Large shadow" : "Soft shadow"}
                        </p>
                      </div>
                    </div>
                  </div>
                </section>

                <aside className="rounded-[28px] border border-white/70 bg-white/80 p-6 shadow-[0_18px_60px_rgba(15,23,42,0.08)] backdrop-blur">
                  <p className="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">State</p>
                  <dl className="mt-4 space-y-4">
                    {toggles.map(({ key, label }) => (
                      <div key={key} className="rounded-2xl bg-slate-100 px-4 py-3">
                        <dt className="text-xs uppercase tracking-[0.2em] text-slate-500">{label}</dt>
                        <dd className="mt-2 text-lg font-semibold text-slate-900">{state[key] ? "On" : "Off"}</dd>
                      </div>
                    ))}
                  </dl>
                </aside>
              </div>
            </section>
          </main>
        );
      }

      createRoot(document.getElementById("app")).render(<App />);
    </script>
  </head>
  <body class="bg-slate-100">
    <div id="app"></div>
  </body>
  </html>
