<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>mui-material.min.js</title>
    <script type="importmap">
      {
        "imports": {
          "react": "../dist/react-all.min.js",
          "react-dom": "../dist/react-all.min.js",
          "react-dom/client": "../dist/react-all.min.js",
          "react/jsx-runtime": "../dist/react-all.min.js",
          "@mui/material": "../dist/mui-material.min.js"
        }
      }
    </script>
    <script src="./vendor/tailwindcss-browser.js"></script>
    <script src="./vendor/babel.min.js"></script>
    <script type="text/babel" data-type="module">
      import React, { useState } from "react";
      import { createRoot } from "react-dom/client";
      import { Button } from "@mui/material";

      function App() {
        const [count, setCount] = useState(0);

        return (
          <main className="min-h-screen bg-[radial-gradient(circle_at_top,_#ede9fe_0%,_#f8fafc_35%,_#dbeafe_100%)] px-4 py-10 text-slate-900">
            <section className="mx-auto max-w-5xl">
              <div className="rounded-[36px] border border-white/70 bg-white/88 p-8 shadow-[0_28px_90px_rgba(15,23,42,0.12)] backdrop-blur">
                <div className="flex flex-wrap items-center justify-between gap-4">
                  <div>
                    <p className="text-xs font-semibold uppercase tracking-[0.34em] text-violet-700">
                      Material UI Bundle
                    </p>
                    <h1 className="mt-2 text-4xl font-semibold tracking-tight text-slate-900">
                      mui-material.min.js
                    </h1>
                    <p className="mt-4 max-w-2xl text-sm leading-7 text-slate-600">
                      这个示例页直接从浏览器 ESM bundle 导入 Material UI 组件，验证 React peer dependency
                      通过 importmap 接入后可以在静态页面中直接渲染。
                    </p>
                  </div>
                  <div className="rounded-full border border-violet-200 bg-violet-50 px-4 py-2 text-sm font-medium text-violet-800">
                    named import works
                  </div>
                </div>

                <div className="mt-8 grid gap-5 lg:grid-cols-[1.1fr_0.9fr]">
                  <div className="rounded-[28px] border border-slate-200 bg-slate-50 p-6 shadow-[0_16px_45px_rgba(15,23,42,0.08)]">
                    <p className="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">
                      Bundle traits
                    </p>
                    <div className="mt-5 grid gap-4 sm:grid-cols-3">
                      {[
                        { label: "Import", value: "named members" },
                        { label: "Peers", value: "react + react-dom" },
                        { label: "Runtime", value: "browser ESM" }
                      ].map((item) => (
                        <div key={item.label} className="rounded-2xl border border-slate-200 bg-white px-4 py-4">
                          <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">{item.label}</p>
                          <p className="mt-3 text-base font-semibold text-slate-900">{item.value}</p>
                        </div>
                      ))}
                    </div>
                    <p className="mt-5 text-sm leading-7 text-slate-600">
                      这里不依赖额外脚手架，只通过浏览器 ESM bundle 和 importmap 完成组件导入。
                    </p>
                  </div>

                  <div className="rounded-[28px] border border-slate-200 bg-slate-50 p-6">
                    <p className="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">
                      Interaction
                    </p>
                    <p className="mt-3 text-3xl font-semibold tracking-tight text-slate-900">{count}</p>
                    <p className="mt-2 text-sm leading-7 text-slate-600">
                      这里直接消费 MUI Button，并覆盖不同 variant，确保最常见的按钮形态都可正常渲染。
                    </p>
                  </div>
                </div>

                <div className="mt-8 flex flex-wrap gap-4">
                  <Button variant="contained" size="large" onClick={() => setCount((value) => value + 1)}>
                    Increment
                  </Button>
                  <Button variant="outlined" size="large" onClick={() => setCount(0)}>
                    Reset
                  </Button>
                  <Button variant="text" size="large" disabled={count === 0}>
                    {`Clicks ${count}`}
                  </Button>
                </div>
              </div>
            </section>
          </main>
        );
      }

      createRoot(document.getElementById("app")).render(<App />);
    </script>
  </head>
  <body class="bg-slate-100">
    <div id="app"></div>
  </body>
</html>
