<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>esm-pkg examples</title>
    <script>
      document.documentElement.dataset.uiReady = "false";
    </script>
    <style>
      html[data-ui-ready="false"] body {
        opacity: 0;
      }

      body {
        transition: opacity 0.18s ease;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "../dist/react-all.min.js",
          "react-dom/client": "../dist/react-all.min.js"
        }
      }
    </script>
    <script src="./vendor/tailwindcss-browser.js"></script>
    <script src="./vendor/babel.min.js"></script>
  </head>
  <body class="bg-slate-100 text-slate-900">
    <div id="app"></div>
    <script type="text/babel" data-type="module">
      import React, { useEffect } from "react";
      import { createRoot } from "react-dom/client";
      import data from "./index.generated.js";

      createRoot(document.getElementById("app")).render(<App />);

      const bundleTableHeaders = ["Bundle", "Packages", "js", "min.js"];

      function App() {
        useEffect(() => {
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              document.documentElement.dataset.uiReady = "true";
            });
          });
        }, []);

        return (
          <main className="mx-auto max-w-6xl px-6 py-10">
            <header className="mb-8 rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
              <p className="text-sm font-medium uppercase tracking-[0.2em] text-sky-600">esm-pkg</p>
              <h1 className="mt-3 text-4xl font-semibold tracking-tight">Examples</h1>
              <p className="mt-3 max-w-2xl text-sm leading-6 text-slate-600">
                自动生成的示例入口和构建产物列表。所有链接和大小数据都来自构建阶段生成的索引数据文件。
              </p>
              <div className="mt-5 flex flex-wrap items-center gap-3">
                <span className="inline-flex items-center rounded-full bg-sky-50 px-4 py-2 text-sm font-medium text-sky-700 ring-1 ring-sky-200">
                  {`${data.package.name}@${data.package.version}`}
                </span>
              </div>
            </header>

            <section className="grid gap-8 lg:grid-cols-[minmax(0,1fr)_minmax(0,1.6fr)]">
              <div className="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
                <h2 className="text-xl font-semibold">Examples</h2>
                <ul id="example-list" className="mt-4 space-y-3">
                  {data.examples.map((example) => (
                    <li key={example.file}>
                      <a
                        href={example.file}
                        className="block rounded-2xl border border-slate-200 px-4 py-3 text-sm font-medium text-slate-800 transition hover:border-sky-300 hover:bg-sky-50 hover:text-sky-700"
                      >
                        {example.title}
                      </a>
                    </li>
                  ))}
                </ul>
              </div>

              <div className="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
                <h2 className="text-xl font-semibold">Bundles</h2>
                <div className="mt-4 overflow-hidden rounded-2xl border border-slate-200">
                  <table className="min-w-full border-collapse text-sm">
                    <thead className="bg-slate-50 text-slate-700">
                      <tr>
                        {bundleTableHeaders.map((label) => (
                          <th
                            key={label}
                            className="border-b border-slate-200 px-4 py-3 text-left font-medium"
                          >
                            {label}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody id="bundle-list" className="bg-white">
                      {data.bundles.map((bundle) => (
                        <tr key={bundle.name} className="align-top">
                          <td className="border-b border-slate-200 px-4 py-3 font-medium text-slate-800">
                            {bundle.name}
                          </td>
                          <td className="border-b border-slate-200 px-4 py-3">
                            <div className="flex flex-wrap gap-2">
                              {bundle.packageVersions.map((pkg) => (
                                <span
                                  key={`${bundle.name}-${pkg.name}`}
                                  className="inline-flex items-center rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-700 ring-1 ring-slate-200"
                                >
                                  {pkg.version ? `${pkg.name}@${pkg.version}` : pkg.name}
                                </span>
                              ))}
                            </div>
                          </td>
                          <td className="border-b border-slate-200 px-4 py-3">
                            <a
                              href={bundle.esm.file}
                              className="text-sky-700 underline decoration-slate-300 underline-offset-4"
                            >
                              {bundle.esm.sizeText}
                            </a>
                          </td>
                          <td className="border-b border-slate-200 px-4 py-3">
                            <a
                              href={bundle.min.file}
                              className="text-sky-700 underline decoration-slate-300 underline-offset-4"
                            >
                              {bundle.min.sizeText}
                            </a>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </section>
          </main>
        );
      }
    </script>
  </body>
</html>
