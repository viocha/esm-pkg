<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>react-all.min.js</title>
    <script type="importmap">
      {
        "imports": {
          "react": "../dist/react-all.min.js",
          "react-dom/client": "../dist/react-all.min.js",
          "react-all": "../dist/react-all.min.js"
        }
      }
    </script>
    <script src="./vendor/tailwindcss-browser.js"></script>
    <script src="./vendor/babel.min.js"></script>
    <script type="text/babel" data-type="module">
      import React, { Children, cloneElement, isValidElement, useEffect, useId, useState, version }
        from "react";
      import { createRoot } from "react-dom/client";
      import ReactAll from "react-all";
			
      createRoot(document.getElementById("app")).render(<App />);

      function DecoratedLabel({ children }) {
        const child = Children.only(children);

        if (!isValidElement(child)) {
          return <span>invalid child</span>;
        }

        return cloneElement(child, {
          title: "decorated-by-cloneElement"
        });
      }

      function App() {
        const [count, setCount] = useState(0);
        const id = useId();

        useEffect(() => {
          document.body.dataset.reactVersion = version;
        }, []);

        return (
          <main className="mx-auto mt-8 max-w-2xl rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
            <div className="mb-6 flex items-center justify-between gap-4">
              <h1 className="text-2xl font-semibold tracking-tight text-slate-900">react-all.min.js</h1>
              <span className="rounded-full bg-sky-100 px-3 py-1 text-sm font-medium text-sky-700">
                Tailwind enabled
              </span>
            </div>
            <p className="text-sm text-slate-600">{`默认导出可用字段数: ${Object.keys(ReactAll).length}`}</p>
            <p id={id} className="mt-2 text-sm text-slate-600">{`React version: ${version}`}</p>
            <React.Fragment>
              <DecoratedLabel>
                <strong className="mt-4 block text-slate-800">
                  使用了 Fragment / Children / cloneElement
                </strong>
              </DecoratedLabel>
            </React.Fragment>
            <div className="mt-6">
              <button
                className="rounded-xl bg-slate-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-slate-700"
                onClick={() => setCount((value) => value + 1)}
              >
                {`点击次数: ${count}`}
              </button>
            </div>
          </main>
        );
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
  </body>
  </html>
